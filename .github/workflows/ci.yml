name: mvp-ci

on:
  push:
    branches:
      - main
      - develop
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mvp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint backend
        run: python -m ruff check src tests

      - name: Run backend tests
        env:
          OPS_AGENT_ENV: test
        run: python -m pytest tests -q -p no:cacheprovider

  frontend:
    name: Frontend lint, tests, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm install

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        env:
          VITE_OPS_AGENT_API_BASE_URL: http://localhost:8000/api/v1
        run: npm run build

  migrations:
    name: Alembic migration validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ops_agent
          POSTGRES_USER: ops_agent
          POSTGRES_PASSWORD: ops_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ops_agent -d ops_agent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Apply migrations
        env:
          OPS_AGENT_ENV: test
          OPS_AGENT_POSTGRES_DSN: postgresql+psycopg://ops_agent:ops_agent@localhost:5432/ops_agent
        run: python -m alembic upgrade head

      - name: Verify current migration head
        env:
          OPS_AGENT_ENV: test
          OPS_AGENT_POSTGRES_DSN: postgresql+psycopg://ops_agent:ops_agent@localhost:5432/ops_agent
        run: python -m alembic current

      - name: Check for model migration drift
        env:
          OPS_AGENT_ENV: test
          OPS_AGENT_POSTGRES_DSN: postgresql+psycopg://ops_agent:ops_agent@localhost:5432/ops_agent
        run: python -m alembic check

  docker-config:
    name: Local Docker config validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate local compose file
        run: docker compose -f infra/docker/compose.local.yml config

  quality-gate:
    name: MVP quality gate
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - migrations
      - docker-config
    steps:
      - name: Confirm required checks passed
        run: echo "Backend, frontend, migrations, and local Docker config checks passed."
