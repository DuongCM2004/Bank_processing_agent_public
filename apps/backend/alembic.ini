[alembic]
script_location = alembic
prepend_sys_path = ./src
file_template = %(rev)s_%(slug)s
timezone = UTC
truncate_slug_length = 40
path_separator = os
version_locations = %(here)s/alembic/versions
sqlalchemy.url = postgresql+psycopg://ops_agent:ops_agent@localhost:5432/ops_agent

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
