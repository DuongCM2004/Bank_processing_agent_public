name: prompt-release

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      prompt_registry_version:
        description: Prompt registry version to release
        required: true
        type: string
      rule_pack_version:
        description: Rule pack version to release
        required: true
        type: string
      model_release_version:
        description: Model release version to pin
        required: true
        type: string

jobs:
  validate-runtime-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: python -m pip install -e .[dev]

      - name: Validate tests and schema assets
        run: pytest

  promote-runtime-config:
    needs: validate-runtime-assets
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Promote prompt/runtime config
        run: |
          echo "Promote prompt registry version ${{ inputs.prompt_registry_version }}"
          echo "Promote rule pack version ${{ inputs.rule_pack_version }}"
          echo "Promote model release version ${{ inputs.model_release_version }}"
          echo "Application images are not redeployed in this workflow."
